# NovelForge — one-command deployment.
#   cp .env.example .env   # then set SECRET_KEY and OPENAI_API_KEY
#   docker compose up -d                       # SQLite (default, zero-config)
#   docker compose --profile mysql up -d       # with a bundled MySQL 8 instance
services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: novelforge:local
    container_name: novelforge-app
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}

      DB_PROVIDER: ${DB_PROVIDER:-sqlite}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/storage/novelforge.db}

      MYSQL_HOST: ${MYSQL_HOST:-db}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-novelforge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-novelforge}

      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-ChangeMe123!}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-admin@example.com}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-gpt-4o-mini}
      WRITER_CHAPTER_VERSION_COUNT: ${WRITER_CHAPTER_VERSION_COUNT:-2}

      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-${OPENAI_API_KEY}}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      EMBEDDING_MODEL_VECTOR_SIZE: ${EMBEDDING_MODEL_VECTOR_SIZE:-3072}

      VECTOR_DB_URL: ${VECTOR_DB_URL:-file:./storage/rag_vectors.db}
      VECTOR_TOP_K_CHUNKS: ${VECTOR_TOP_K_CHUNKS:-5}
      VECTOR_TOP_K_SUMMARIES: ${VECTOR_TOP_K_SUMMARIES:-3}
      VECTOR_CHUNK_SIZE: ${VECTOR_CHUNK_SIZE:-480}
      VECTOR_CHUNK_OVERLAP: ${VECTOR_CHUNK_OVERLAP:-120}

      ALLOW_USER_REGISTRATION: ${ALLOW_USER_REGISTRATION:-false}
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-NovelForge}
    restart: unless-stopped
    volumes:
      - ${SQLITE_STORAGE_SOURCE:-novelforge-data}:/app/storage
    networks:
      - novelforge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Optional MySQL 8 — enabled with `--profile mysql`
  db:
    image: mysql:8.0
    container_name: novelforge-db
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ChangeMe_RootPassword123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-novelforge}
      MYSQL_USER: ${MYSQL_USER:-novelforge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ChangeMe_Password123}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - novelforge
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
    driver: local
  novelforge-data:
    driver: local

networks:
  novelforge:
    driver: bridge
